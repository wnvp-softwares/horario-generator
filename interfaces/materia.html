<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materia</title>
    <link rel="stylesheet" href="../styles/materia.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <aside>
        <img src="../public/COBAEJ-logo-deep.png" alt="Logotipo de SiCECOBAEJ">
        <button class="asideBtn docente">Docentes <i class="ri-user-fill"></i></button>
        <button class="asideBtn materia">Materia <i class="ri-book-2-line"></i></button>
        <button class="asideBtn imparte">Imparte <i class="ri-contacts-book-3-fill"></i></button>
        <button class="asideBtn grupo">Grupos <i class="ri-graduation-cap-fill"></i></button>
        <button class="asideBtn clase">Clases <i class="ri-time-fill"></i></button>
        <button class="asideBtn horario">Horarios <i class="ri-calendar-check-line"></i></button>

    </aside>

    <main>
        <header>
            <h1>MATERIA <i class="ri-book-marked-line"></i></h1>
        </header>

        <div class="vista-materia" id="vista-materia">
            <button class="action agregar" id="add-materia"><i class="ri-add-large-line"></i></button>

            <div class="vista-registrados" id="vista-materia-registrados">

            </div>
        </div>

        <div class="materia-info hidden" id="materia-info">
            <button class="cancel-form" id="cancel-form"><i class="ri-close-line"></i></button>
            <form action="submit" class="form-materia" id="form-materia">
                <h2 class="form-title">Materia <i class="ri-book-open-fill"></i></h2>
                <label for="nombre">Nombre de materia</label>
                <input type="text" name="nombre" placeholder="Nombre de la materia" required class="materiaInput nombre">
                <label for="horas_sem">Horas semanales</label>
                <input type="number" name="horas_sem" min="0" value="0" class="materiaInput horas_sem">
                <label for="semestre">Semestre</label>
                <select name="semestre" id="" class="materiaInput semestre">
                    <option value="1" name="semestre">1er Semestre</option>
                    <option value="2" name="semestre">2do Semestre</option>
                    <option value="3" name="semestre">3er Semestre</option>
                    <option value="4" name="semestre">4to Semestre</option>
                    <option value="5" name="semestre">5to Semestre</option>
                    <option value="6" name="semestre">6to Semestre</option>
                </select>

                <button type="submit" class="form-action relativo" id="form-materia-disparar">Crear</button>
            </form>
        </div>

        <div class="toast hidden" id="toast">
            <h2 id="toast-title">RELATIVO</h2>
            <p id="toast-message">RELATIVO... TEXTO RELATIVO</p>
            <div class="actions-toast">
                <button class="btn-toast uncheck" id="toast-uncheck"><i class="ri-close-line"></i></button>
                <button class="btn-toast check" id="toast-check"><i class="ri-check-line"></i></button>
            </div>
        </div>
    </main>

    <script src="../scripts/materia.js"></script>
</body>

</html>
