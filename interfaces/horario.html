<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios</title>
    <link rel="stylesheet" href="../styles/horario.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <aside>
        <img src="../public/COBAEJ-logo-deep.png" alt="Logotipo de SiCECOBAEJ">
        <button class="asideBtn docente">Docentes <i class="ri-user-fill"></i></button>
        <button class="asideBtn materia">Materia <i class="ri-book-2-line"></i></button>
        <button class="asideBtn imparte">Imparte <i class="ri-contacts-book-3-fill"></i></button>
        <button class="asideBtn grupo">Grupos <i class="ri-graduation-cap-fill"></i></button>
        <button class="asideBtn clase">Clases <i class="ri-time-fill"></i></button>
        <button class="asideBtn horario">Horarios <i class="ri-calendar-check-line"></i></button>
    </aside>

    <main>
        <header>
            <h1>GESTIÓN DE HORARIOS <i class="ri-calendar-check-line"></i></h1>
        </header>

        <div class="vista-horario" id="vista-horario">
            <button class="action agregar" id="add-horario"><i class="ri-add-large-line"></i></button>

            <div class="vista-registrados" id="vista-horarios-registrados">
                </div>
        </div>

        <div class="horario-fullscreen-modal hidden" id="horario-fullscreen">
            <header class="modal-header">
                <h2 id="modal-dinamico-titulo">Configuración de Horario</h2>
                <button class="btn-cerrar-fullscreen" id="btn-cerrar-modal"><i class="ri-close-large-line"></i> Cerrar</button>
            </header>

            <div class="modal-body-container">
                <div class="panel-controles">
                    <div class="control-group">
                        <label for="nombre_horario">Nombre del Horario</label>
                        <input type="text" id="nombre_horario" placeholder="Ej. Semestre 2026-A" required>
                    </div>

                    <div class="control-group">
                        <label for="select-grupo">Grupo Destino</label>
                        <select id="select-grupo" required>
                            </select>
                    </div>

                    <div class="control-group box-asignacion">
                        <h3>Asignación Activa</h3>
                        <label for="select-imparte">Selecciona Docente - Materia</label>
                        <select id="select-imparte">
                            <option value="">-- Selecciona una Relación --</option>
                            </select>
                        <div class="info-disponibilidad" id="info-disponibilidad">
                            </div>
                    </div>

                    <button class="btn-guardar-todo" id="btn-guardar-horario"><i class="ri-save-line"></i> Guardar Todo el Horario</button>
                </div>

                <div class="panel-tabla">
                    <table class="tabla-horario-matriz" id="tabla-horario">
                        <thead>
                            <tr>
                                <th>Módulo / Hora</th>
                                <th>Lunes</th>
                                <th>Martes</th>
                                <th>Miércoles</th>
                                <th>Jueves</th>
                                <th>Viernes</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-matriz">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="toast hidden" id="toast">
            <h2 id="toast-title">RELATIVO</h2>
            <p id="toast-message">RELATIVO... TEXTO RELATIVO</p>
            <div class="actions-toast">
                <button class="btn-toast uncheck" id="toast-uncheck"><i class="ri-close-line"></i></button>
                <button class="btn-toast check" id="toast-check"><i class="ri-check-line"></i></button>
            </div>
        </div>
    </main>

    <script src="../scripts/horario.js"></script>
</body>

</html>
