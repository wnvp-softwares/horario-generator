<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clases</title>
    <link rel="stylesheet" href="../styles/clase.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <aside>
        <img src="../public/COBAEJ-logo-deep.png" alt="Logotipo de SiCECOBAEJ">
        <button class="asideBtn docente">Docentes <i class="ri-user-fill"></i></button>
        <button class="asideBtn materia">Materia <i class="ri-book-2-line"></i></button>
        <button class="asideBtn imparte">Imparte <i class="ri-contacts-book-3-fill"></i></button>
        <button class="asideBtn grupo">Grupos <i class="ri-graduation-cap-fill"></i></button>
        <button class="asideBtn clase">Clases <i class="ri-time-fill"></i></button>
        <button class="asideBtn horario">Horarios <i class="ri-calendar-check-line"></i></button>
    </aside>

    <main>
        <header>
            <h1>CLASES / MÓDULOS <i class="ri-time-fill"></i></h1>
        </header>

        <div class="vista-clase" id="vista-clase">
            <button class="action agregar" id="add-clase"><i class="ri-add-large-line"></i></button>

            <div class="vista-registrados-grid" id="vista-clase-registrados">
                </div>
        </div>

        <div class="clase-info hidden" id="clase-info">
            <button class="cancel-form" id="cancel-form"><i class="ri-close-line"></i></button>
            <form action="submit" class="form-clase" id="form-clase">
                <h2 class="form-title">Clase <i class="ri-time-fill"></i></h2>
                
                <label for="nombre">Nombre del Módulo</label>
                <input type="text" name="nombre" placeholder="Ej. 1ra Hora, 2da Hora" required class="claseInput nombre">
                
                <label for="hora_inicio">Hora de Inicio</label>
                <input type="time" name="hora_inicio" required class="claseInput hora_inicio">

                <label for="hora_fin">Hora de Fin</label>
                <input type="time" name="hora_fin" required class="claseInput hora_fin">

                <button type="submit" class="form-action" id="form-clase-disparar">Crear</button>
            </form>
        </div>

        <div class="toast hidden" id="toast">
            <h2 id="toast-title">RELATIVO</h2>
            <p id="toast-message">RELATIVO... TEXTO RELATIVO</p>
            <div class="actions-toast">
                <button class="btn-toast uncheck" id="toast-uncheck"><i class="ri-close-line"></i></button>
                <button class="btn-toast check" id="toast-check"><i class="ri-check-line"></i></button>
            </div>
        </div>
    </main>

    <script src="../scripts/clase.js"></script>
</body>

</html>
